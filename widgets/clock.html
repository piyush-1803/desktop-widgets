<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clock Widget</title>
    <style>
      :root {
        --bg: rgba(16, 18, 22, 1.0);
        --stroke: rgba(255, 255, 255, 0.14);
        --shine: rgba(255, 255, 255, 0.10);
        --text: rgba(245, 246, 248, 0.94);
        --muted: rgba(245, 246, 248, 0.72);
        --accent: rgba(110, 231, 255, 0.85);
        --shadow: rgba(0, 0, 0, 0.45);
      }

      html,
      body {
        width: 200px;
        height: 120px;
        margin: 0;
        padding: 0;
        background: #101216;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
      }

      .card {
        box-sizing: border-box;
        width: 200px;
        height: 120px;
        padding: 14px 14px 12px 14px;
        border-radius: 18px;
        background: linear-gradient(135deg, var(--bg), rgba(16, 18, 22, 0.95));
        border: 1px solid var(--stroke);
        box-shadow: 0 18px 42px var(--shadow);
        position: relative;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 18px;
        background: radial-gradient(
            90px 60px at 30px 18px,
            rgba(255, 255, 255, 0.22),
            rgba(255, 255, 255, 0) 65%
          ),
          radial-gradient(
            140px 90px at 175px 18px,
            rgba(110, 231, 255, 0.16),
            rgba(110, 231, 255, 0) 70%
          );
        pointer-events: none;
        mix-blend-mode: screen;
      }

      .row {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        height: 100%;
        justify-content: center;
        gap: 8px;
      }

      .time {
        letter-spacing: -0.02em;
        font-weight: 700;
        font-size: 40px;
        line-height: 1;
        color: var(--text);
        text-shadow: 0 1px 0 rgba(0, 0, 0, 0.25);
        display: flex;
        align-items: baseline;
        gap: 8px;
      }

      .seconds {
        font-size: 16px;
        font-weight: 650;
        color: var(--accent);
        opacity: 0.92;
        letter-spacing: 0.02em;
      }

      .date {
        font-size: 14px;
        color: var(--muted);
        letter-spacing: 0.01em;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .pill {
        margin-left: auto;
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
        color: rgba(245, 246, 248, 0.82);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="row">
        <div class="time">
          <span id="hhmm">--:--</span>
          <span class="seconds" id="ss">--</span>
        </div>
        <div class="date">
          <span id="date">---</span>
          <span class="pill" id="weekday">---</span>
        </div>
      </div>
    </div>

    <script>
      const fmt2 = (n) => String(n).padStart(2, "0");

      function tick() {
        const d = new Date();
        const hh = fmt2(d.getHours());
        const mm = fmt2(d.getMinutes());
        const ss = fmt2(d.getSeconds());

        const weekday = d.toLocaleDateString(undefined, { weekday: "short" });
        const date = d.toLocaleDateString(undefined, {
          year: "numeric",
          month: "short",
          day: "2-digit",
        });

        document.getElementById("hhmm").textContent = `${hh}:${mm}`;
        document.getElementById("ss").textContent = ss;
        document.getElementById("weekday").textContent = weekday;
        document.getElementById("date").textContent = date;
      }

      tick();
      setInterval(tick, 250);
    </script>
  </body>
</html>
